# ============================================================
# DeepStream 車牌辨識 (LPR) - camD 設定
# ============================================================

source_id: "camD"                     # 來源代號（OSD 標記 / 輸出檔名前綴 / DB 欄位）

# ------------------------------------------------------------
# 裝置資訊
# ------------------------------------------------------------
device:
  code: "EdgeX317"                    # 邊緣機器代號，寫進 DB DeviceCode 欄位

# ------------------------------------------------------------
# 輸入來源 ⭐
# ------------------------------------------------------------
# 可填：
#   "videos/test1.avi"                # 影片（相對路徑，放在 videos/ 資料夾）
#   "rtsp://user:pass@ip:port/path"   # RTSP 串流
source: "videos/test4.mp4"

stream_fps: 15.0                      # 串流 FPS
start_time: "2025-05-22 00:23:57"     # 影片首幀對應的真實時刻（RTSP 自動忽略）
                                      # 格式：YYYY-MM-DD HH:MM:SS

# ------------------------------------------------------------
# 模型 Engine ⭐
# ------------------------------------------------------------
weight_imgsz: 640                     # car / plate 模型輸入解析度
num_imgsz: 320                        # num 模型輸入解析度
weight_batch_size: 2                  # car / plate engine max batch
num_weight_batch_size: 16             # num engine max batch

# ------------------------------------------------------------
# 偵測閾值
# ------------------------------------------------------------
detect:
  car_conf:   0.25                    # PGIE 車輛偵測信心值
  car_iou:    0.45                    # PGIE 車輛偵測 NMS IoU
  plate_conf: 0.25                    # SGIE 車牌偵測信心值
  plate_iou:  0.45                    # SGIE 車牌偵測 NMS IoU
  num_conf:   0.25                    # SGIE 字元偵測信心值
  num_iou:    0.45                    # SGIE 字元偵測 NMS IoU

# ------------------------------------------------------------
# ROI / 裁切遮罩 ⭐
# ------------------------------------------------------------
geometry:
  base_w: 1920                        # 來源畫面寬
  base_h: 1080                        # 來源畫面高

  # 計數 ROI（可定義多個，一台車經過多個 ROI 各寫一筆 DB）
  regions:
    roi_1:
      - [0,    100]
      - [1920, 100]
      - [1920, 1080]
      - [0,    1080]

  # 裁切遮罩：此矩形以外不送進 PGIE（節省算力）
  crop_points:
    - [0,    50]
    - [1920, 50]
    - [1920, 1080]
    - [0,    1080]

# ------------------------------------------------------------
# 結算規則
# ------------------------------------------------------------
session:
  cleanup_frames: 30                  # 物件消失 N 幀後結算
  flush_interval_seconds: 5           # 每 N 秒把 pending 寫進 DB（0=即時）

# ------------------------------------------------------------
# 容忍 / 抖動過濾 ⭐
# ------------------------------------------------------------
# movement_threshold = Y 軸位移像素門檻
#   位移 > 此值 → IN（向下移動）
#   位移 < -此值 → OUT（向上移動）
#   絕對值 < 此值 → NA（視為抖動誤判，不寫 DB）
# min_roi_hits = ROI 命中最少幀數（防止短暫飄過誤判）
track_logic:
  movement_threshold: 30
  min_roi_hits: 2

# ------------------------------------------------------------
# 輸出設定 ⭐
# ------------------------------------------------------------
output:
  save_output_video: true             # 可選：true / false  是否輸出推理後影片 ❌
  output_video_dir: "output_video"

  save_output_db: true                # 可選：true / false  是否寫入 SQLite DB
  output_db_dir: "output_db"          # DB 檔輸出資料夾

  save_screenshot: true               # 可選：是否啟用截圖（車種框 + 車牌框）❌

# ------------------------------------------------------------
# 本地顯示
# ------------------------------------------------------------
display:
  show_window: true                   # 可選：true / false  本地預覽視窗 ❌
  show_fps_overlay: true              # 可選：true / false  畫面左上 FPS
  show_roi: true                      # 可選：true / false  ROI 黃線
  show_crop: true                     # 可選：true / false  裁切框青綠線

# ------------------------------------------------------------
# RTSP 推流 ⭐
# ------------------------------------------------------------
# 連線範例：rtsp://<邊緣機 IP>:<port>/<mount_path>
# 例：     rtsp://192.168.1.100:8554/camD
rtsp_push:
  enable: true                        # 可選：true / false
  port: 8554                          # RTSP server 監聽 port
  mount_path: "camD"                  # URL 路徑名稱（rtsp://IP:port/{mount_path}）
  bitrate: 4000000                    # bps，1080p 建議 4M~8M
  encoder: "h264"                     # 可選：h264（相容性高，推薦） / h265（檔案小，部分播放器不支援）

# ------------------------------------------------------------
# 追蹤器 ⭐  
# ------------------------------------------------------------
# 微調該追蹤器內部參數 → 編輯 boxmot/configs/trackers/<type>.yaml
# 可選：'nvdcf', 'bytetrack', 'ocsort', 'fasttracker', 'sfsort', 'cbiou'
tracker:
  type: "cbiou"                       # ⭐ 改這裡切換追蹤器